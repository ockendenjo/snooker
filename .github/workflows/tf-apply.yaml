name: Terraform apply

on:
  workflow_call:
    secrets:
      STATE_BUCKET:
        required: true
      AWS_ROLE_ARN:
        required: true
    inputs:
      environment:
        required: true
        type: string

permissions:
  contents: read

jobs:
  apply:
    name: Apply
    timeout-minutes: 8
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write # OIDC authentication with AWS
      contents: read
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1

      - name: Assume role
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-region: 'eu-west-1'
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Pull terraform config
        working-directory: stack
        shell: bash
        run: |
          mkdir -p tfvars
          aws s3 cp "s3://${INPUTS_BUCKET}/${INPUTS_ENV}.auto.tfvars" tfvars/
          aws s3 cp "s3://${INPUTS_BUCKET}/${INPUTS_ENV}.backend.tfvars" tfvars/
        env:
          INPUTS_ENV: ${{ inputs.environment }}
          INPUTS_BUCKET: ${{ secrets.STATE_BUCKET }}

      - name: Terraform apply
        working-directory: stack
        run: |
          terraform init -backend-config="tfvars/${INPUTS_ENV}.backend.tfvars"
          terraform apply -auto-approve -var-file="tfvars/${INPUTS_ENV}.auto.tfvars" -input=false
        env:
          INPUTS_ENV: ${{ inputs.environment }}
