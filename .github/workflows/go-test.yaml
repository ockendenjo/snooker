name: Go tests

on:
  workflow_call: { }

permissions:
  contents: read

jobs:
  test:
    name: Test
    timeout-minutes: 3
    runs-on: ubuntu-latest
    services:
      dynamodb:
        image: 'amazon/dynamodb-local:3.3.0@sha256:d89f8fcc6b1a39cb35976c248ed42a28c66ae00dc043099210f5571e42648ab4'
        ports:
          - 8000:8000
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Restore go cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/go-build
          key: "go-testing-${{ hashFiles('go.mod', 'cmd/**/*.go', 'pkg/**/*.go') }}"
          restore-keys: |
            go-testing-

      - name: Install tparse
        run:
          go install github.com/mfridman/tparse@v0.18.0

      - name: Run tests
        env:
          RUN_DYNAMODB_LOCAL_TESTS: '1'
        run: go test $(go list ./... | grep -v /e2e) -json | tparse
