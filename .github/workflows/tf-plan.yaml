name: Terraform plan

on:
  workflow_call:
    secrets:
      AWS_ROLE_ARN:
        required: true
      STATE_BUCKET:
        required: true
      AWS_ACCOUNT_ID:
        required: true
    inputs:
      manifest_file:
        required: true
        type: string

permissions:
  contents: read

jobs:
  plan:
    name: Plan
    timeout-minutes: 2
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write # OIDC authentication with AWS
      contents: read
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1

      - name: Assume role
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-region: 'eu-west-1'
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Pull terraform config
        working-directory: stack
        shell: bash
        run: |
          mkdir -p tfvars
          aws s3 cp "s3://${INPUTS_BUCKET}/dev.auto.tfvars" tfvars/
          aws s3 cp "s3://${INPUTS_BUCKET}/dev.backend.tfvars" tfvars/
        env:
          INPUTS_BUCKET: ${{ secrets.STATE_BUCKET }}

      - name: Update manifest file
        shell: bash
        working-directory: stack
        env:
          MANIFEST_FILE: ${{ inputs.manifest_file }}
        run: |
          sed -i "s#manifest_file[[:space:]]*=[[:space:]]*\"default.json\"#manifest_file = \"$MANIFEST_FILE\"#" "tfvars/dev.auto.tfvars"

      - name: Terraform plan
        working-directory: stack
        run: |
          terraform init -backend-config="tfvars/dev.backend.tfvars"
          terraform plan -var-file="tfvars/dev.auto.tfvars" -input=false
