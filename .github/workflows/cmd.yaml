name: Build cmd

on:
  workflow_call:
    inputs:
      upload:
        type: boolean
        default: false
      manifest_file:
        type: string
        required: true
    secrets:
      AWS_ROLE_ARN:
        required: true
      BINARY_BUCKET:
        required: true

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write # OIDC authentication with AWS
      contents: read
    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Restore go cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/go-build
          key: "go-build-${{ hashFiles('go.mod', 'cmd/**/*.go', 'pkg/**/*.go') }}"
          restore-keys: |
            go-build-

      - name: Build-cmd
        run: go run ./scripts/build-cmd --zip

      - name: Assume role
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          aws-region: 'eu-west-1'
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Upload
        run: go run ./scripts/upload-binaries
        env:
          BINARY_BUCKET: ${{ secrets.BINARY_BUCKET }}
          MANIFEST_FILE: ${{ inputs.manifest_file }}
