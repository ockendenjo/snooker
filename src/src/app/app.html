@if (!environment.production) {
    <div class="dev-site">
        This is the development and testing site. Data may be deleted at any
        time.
    </div>
}

<mat-sidenav-container class="full">
    <mat-sidenav
        [mode]="mobileQuery.matches ? 'over' : 'side'"
        [opened]="!mobileQuery.matches"
        #sidenav
        (click)="sidenav.mode === 'side' || sidenav.close()"
    >
        <div [ngClass]="{dark: isDark}" class="fullheight">
            <div class="header"></div>

            <nav>
                <div
                    routerLink=""
                    routerLinkActive="active"
                    [routerLinkActiveOptions]="{exact: true}"
                >
                    Home
                </div>
                <div routerLink="info" routerLinkActive="active">Info</div>
                <div routerLink="abvs" routerLinkActive="active">ABV table</div>

                @if (authState == AuthState.SignedIn) {
                    <!-- nothing yet -->
                }
            </nav>

            <div class="version">v0.{{ gitCount }}</div>
        </div>
    </mat-sidenav>
    <mat-sidenav-content>
        <div [ngClass]="{dark: isDark}" class="page-shell">
            <div class="header row">
                <div class="button-cont">
                    <button
                        mat-icon-button
                        aria-label="Open menu"
                        (click)="sidenav.toggle()"
                        class="menu-button"
                    >
                        <mat-icon>menu</mat-icon>
                    </button>
                </div>

                <div class="score-cont"></div>

                <div class="header-center flex-fill">
                    <img
                        src="snooker.png"
                        alt="HBT logo"
                        routerLink=""
                        class="home"
                    />
                </div>

                <div class="score-cont" id="total-points">
                    @if (points > 0) {
                        <span>{{ Math.floor(points / 10) }}</span>
                    }
                </div>

                <div class="button-cont">
                    @if (authState == AuthState.SignedIn) {
                        <button
                            mat-icon-button
                            [matMenuTriggerFor]="menu"
                            id="account-menu"
                        >
                            <mat-icon>account_circle</mat-icon>
                        </button>
                    }

                    <mat-menu #menu>
                        <button mat-menu-item (click)="signOut()" id="sign-out">
                            Sign out
                        </button>
                    </mat-menu>
                </div>
            </div>
            <router-outlet />
        </div>
    </mat-sidenav-content>
</mat-sidenav-container>
