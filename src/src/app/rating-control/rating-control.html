<div class="rating">
    <div>Poor</div>
    @for (r of ratings; track r) {
        <button
            type="button"
            [ngClass]="'b' + r"
            [class.selected]="value === r"
            [disabled]="isDisabled"
            (click)="select(r)"
        >
            {{ r }}
        </button>
    }
    <div>Excellent</div>
</div>
