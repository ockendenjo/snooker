<mat-form-field class="full-width">
    <mat-label>Drink name</mat-label>

    <mat-autocomplete
        #drinkAuto="matAutocomplete"
        (optionSelected)="beerSelected.emit($event.option.value)"
        [displayWith]="getBeerText"
    >
        @for (beer of filteredBeers; track beer.untappd) {
            <mat-option [value]="beer" class="beer">
                <div class="beer-row">
                    <div
                        class="beer-col-left"
                        [ngClass]="getColour(beer)"
                    ></div>
                    <div class="beer-img">
                        <app-beer-image
                            [beer]="beer"
                            [height]="40"
                        ></app-beer-image>
                    </div>
                    <div class="beer-text">
                        <div>{{ beer.name }}</div>
                        <div class="details">
                            {{ beer.brewery }}
                            @if (beer.abv) {
                                | {{ beer.abv }}%
                            }
                            @if (beer.style) {
                                | {{ beer.style }}
                            }
                        </div>
                    </div>
                    <div
                        class="beer-col-right"
                        [ngClass]="getColour(beer)"
                    ></div>
                </div>
            </mat-option>
        }
    </mat-autocomplete>

    <input
        matInput
        [formControl]="control"
        id="name"
        type="text"
        [matAutocomplete]="drinkAuto"
        (input)="inputChanged.emit()"
    />
</mat-form-field>
