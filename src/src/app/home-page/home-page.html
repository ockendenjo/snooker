<div class="content center">
    <h1>Pub Snooker</h1>
    <p>Welcome to the HBT Pub Snooker Drinking Challenge</p>
    <p>
        The challenge runs from 17 Apr to 03 May 2027 (inc.) which is the same
        as the 2027 World Snooker Championship
    </p>

    @let ad = authData();
    @switch (ad.state) {
        @case (AuthState.SignedIn) {
            <!-- nothing yet -->
        }
        @case (AuthState.NoAuth) {
            <button type="button" id="sign-in" (click)="signIn()">
                Sign in / Create account
            </button>
        }
    }
</div>
